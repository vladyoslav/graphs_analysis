name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spark-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boruvka_spark
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Run tests
        run: make test